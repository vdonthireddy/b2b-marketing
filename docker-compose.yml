services:
  mysql:
    image: mysql:8.0
    container_name: journeyforge-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: journeyforge
      MYSQL_USER: journeyforge
      MYSQL_PASSWORD: journeyforge_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: journeyforge-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+aiomysql://journeyforge:journeyforge_pass@mysql:3306/journeyforge
      - SECRET_KEY=your_super_secret_key_change_in_production
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - USE_OLLAMA=True
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=gemma2:2b
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: journeyforge-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  mysql_data:
